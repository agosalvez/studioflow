version: "3.9"

services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - orderly
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - orderly
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/orderly-api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${API_PORT}:${API_PORT}"
    networks:
      - orderly
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/orderly-web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"
    networks:
      - orderly
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/orderly-worker/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
    networks:
      - orderly
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  db_data:
  rabbitmq_data:
  uploads:

networks:
  orderly:
    driver: bridge
