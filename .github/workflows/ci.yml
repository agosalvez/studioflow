name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests y build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Tests unitarios (API)
        run: pnpm --filter studioflow-api test

      - name: Build API
        run: pnpm --filter studioflow-api build

      - name: Build Web
        run: pnpm --filter studioflow-web build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Build Worker
        run: pnpm --filter studioflow-worker build

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/studioflow-api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest

      - name: Build y push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/studioflow-web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: ghcr.io/${{ github.repository }}/web:latest

      - name: Build y push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/studioflow-worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:latest
